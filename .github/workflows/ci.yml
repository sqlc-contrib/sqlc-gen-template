name: CI

permissions:
  contents: write
  id-token: write
  pull-requests: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Serialize runs targeting the same ref so octocov's auto-push back to main
# doesn't race with parallel runs (e.g. a dependabot auto-merge landing
# between checkout and octocov's git push → non-fast-forward).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Run Tests
        run: nix develop --command go tool ginkgo run -r -coverprofile=coverage.out -covermode=atomic ./...

      - name: Run octocov
        uses: k1LoW/octocov-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          manifest-file: .github/config/release-please-manifest.json
          config-file: .github/config/release-please-config.json
          target-branch: main

  build-release:
    needs: release
    if: ${{ needs.release.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build WASM with Nix
        run: nix build .#wasm

      - name: Prepare Release Assets
        run: |
          mkdir -p release
          install -m 0644 result/bin/sqlc-gen-template.wasm release/sqlc-gen-template.wasm
          cd release && sha256sum sqlc-gen-template.wasm > sqlc-gen-template.wasm.sha256

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          files: |
            release/sqlc-gen-template.wasm
            release/sqlc-gen-template.wasm.sha256
